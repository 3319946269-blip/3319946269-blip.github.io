<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>匠芯 - 传统技艺创作辅助系统</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #c17a62;
            --primary-dark: #8b5a4a;
            --secondary: #6b8e6b;
            --accent: #d4a574;
            --light: #f8f4e9;
            --dark: #2c2416;
            --wood: #8b7355;
            --paper: #f5f0e1;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Noto Serif SC', 'SimSun', serif;
        }
        
        body {
            background: linear-gradient(135deg, #f8f4e9 0%, #f0ebdd 100%);
            color: var(--dark);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M11 18c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm48 25c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm-43-7c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm63 31c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM34 90c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm56-76c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM12 86c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm28-65c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm23-11c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-6 60c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm29 22c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zM32 63c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm57-13c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-9-21c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM60 91c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM35 41c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM12 60c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2z' fill='%23c17a62' fill-opacity='0.05' fill-rule='evenodd'/%3E%3C/svg%3E");
            opacity: 0.3;
            z-index: -1;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        /* 头部样式 */
        .header {
            padding: 30px 0;
            text-align: center;
            position: relative;
            border-bottom: 2px solid var(--wood);
            margin-bottom: 40px;
        }
        
        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            gap: 15px;
        }
        
        .logo-icon {
            font-size: 2.5rem;
            color: var(--primary);
            background: var(--light);
            padding: 15px;
            border-radius: 50%;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        
        .logo-text {
            font-size: 3rem;
            font-weight: 700;
            color: var(--primary-dark);
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            letter-spacing: 5px;
        }
        
        .tagline {
            font-size: 1.2rem;
            color: var(--wood);
            font-style: italic;
            margin-bottom: 10px;
        }
        
        .subtagline {
            font-size: 1rem;
            color: var(--secondary);
            max-width: 800px;
            margin: 0 auto;
            line-height: 1.6;
        }
        
        /* 技艺展示区 */
        .craft-display {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 50px;
        }
        
        .craft-card {
            background: var(--paper);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
            border: 1px solid rgba(193, 122, 98, 0.2);
            cursor: pointer;
        }
        
        .craft-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.15);
        }
        
        .craft-card.active {
            border: 2px solid var(--primary);
            box-shadow: 0 15px 30px rgba(193, 122, 98, 0.2);
        }
        
        .craft-image {
            height: 180px;
            background-size: cover;
            background-position: center;
            position: relative;
        }
        
        .craft-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(44, 36, 22, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .craft-card:hover .craft-overlay {
            opacity: 1;
        }
        
        .craft-overlay span {
            color: white;
            background: var(--primary);
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: 600;
        }
        
        .craft-info {
            padding: 20px;
        }
        
        .craft-name {
            font-size: 1.4rem;
            color: var(--primary-dark);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .craft-name i {
            color: var(--accent);
        }
        
        .craft-desc {
            color: var(--dark);
            line-height: 1.6;
            font-size: 0.95rem;
            margin-bottom: 15px;
        }
        
        .craft-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .craft-tag {
            background: rgba(193, 122, 98, 0.1);
            color: var(--primary);
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 0.85rem;
            border: 1px solid rgba(193, 122, 98, 0.3);
        }
        
        /* 创作区 */
        .creation-area {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            margin-bottom: 50px;
        }
        
        .input-section, .output-section {
            flex: 1;
            min-width: 300px;
            background: var(--paper);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(139, 117, 85, 0.2);
        }
        
        .section-title {
            font-size: 1.5rem;
            color: var(--primary-dark);
            margin-bottom: 25px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--accent);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .section-title i {
            color: var(--secondary);
        }
        
        .craft-selector {
            margin-bottom: 25px;
        }
        
        .selector-label {
            display: block;
            margin-bottom: 10px;
            color: var(--wood);
            font-weight: 600;
        }
        
        .selector-container {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .selector-btn {
            padding: 10px 20px;
            background: white;
            border: 1px solid rgba(139, 117, 85, 0.3);
            border-radius: 8px;
            color: var(--wood);
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .selector-btn:hover {
            background: rgba(193, 122, 98, 0.1);
            border-color: var(--primary);
        }
        
        .selector-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        
        textarea {
            width: 100%;
            height: 180px;
            background: white;
            border: 1px solid rgba(139, 117, 85, 0.3);
            border-radius: 10px;
            color: var(--dark);
            padding: 15px;
            font-size: 1rem;
            resize: vertical;
            margin-bottom: 20px;
            transition: all 0.3s;
            font-family: 'Noto Serif SC', 'SimSun', serif;
        }
        
        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(193, 122, 98, 0.2);
        }
        
        .input-hint {
            color: var(--secondary);
            font-style: italic;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 25px;
        }
        
        .btn {
            flex: 1;
            min-width: 140px;
            padding: 14px 20px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
        }
        
        .btn-secondary {
            background: white;
            color: var(--primary-dark);
            border: 1px solid var(--primary);
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        /* 输出区 */
        .output-content {
            background: white;
            border-radius: 10px;
            padding: 25px;
            min-height: 300px;
            border: 1px solid rgba(139, 117, 85, 0.2);
            position: relative;
            overflow-y: auto;
            white-space: pre-wrap;
            line-height: 1.8;
            font-size: 1.05rem;
        }
        
        .craft-output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(139, 117, 85, 0.2);
        }
        
        .output-title {
            font-size: 1.3rem;
            color: var(--primary-dark);
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }
        
        .loading-icon {
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 15px;
            animation: spin 2s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .loading-text {
            color: var(--wood);
            font-size: 1.1rem;
        }
        
        /* 传统元素装饰 */
        .traditional-border {
            position: relative;
            padding: 10px;
        }
        
        .traditional-border::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 2px solid var(--accent);
            border-radius: 5px;
            pointer-events: none;
        }
        
        .seal {
            position: absolute;
            width: 80px;
            height: 80px;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            font-weight: bold;
            transform: rotate(-15deg);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            z-index: 2;
        }
        
        .seal-1 {
            top: -20px;
            right: -20px;
        }
        
        .seal-2 {
            bottom: -20px;
            left: -20px;
        }
        
        /* 底部 */
        .footer {
            text-align: center;
            padding: 30px 0;
            color: var(--wood);
            border-top: 1px solid rgba(139, 117, 85, 0.3);
            margin-top: 30px;
            font-size: 0.9rem;
        }
        
        .footer-logo {
            font-size: 1.5rem;
            color: var(--primary);
            margin-bottom: 10px;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .logo-text {
                font-size: 2.2rem;
                letter-spacing: 3px;
            }
            
            .creation-area {
                flex-direction: column;
            }
            
            .craft-display {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <header class="header">
            <div class="logo">
                <div class="logo-icon">
                    <i class="fas fa-hands"></i>
                </div>
                <div class="logo-text">匠芯</div>
            </div>
            <p class="tagline">以心传艺，以艺养心</p>
            <p class="subtagline">辅助体验传统技艺的创作系统，通过智能辅助帮助您感受、理解和创作传统手工艺品，让千年技艺在数字时代焕发新生。</p>
        </header>
        
        <!-- 技艺展示区 -->
        <section class="craft-display" id="craftDisplay">
            <!-- 技艺卡片将通过JS动态生成 -->
        </section>
        
        <!-- 创作区 -->
        <section class="creation-area">
            <div class="input-section traditional-border">
                <div class="seal seal-1">匠</div>
                
                <h2 class="section-title"><i class="fas fa-pen-nib"></i> 创作灵感</h2>
                
                <div class="craft-selector">
                    <label class="selector-label">选择传统技艺：</label>
                    <div class="selector-container" id="craftSelector">
                        <!-- 选择按钮将通过JS动态生成 -->
                    </div>
                </div>
                
                <div class="input-hint">
                    <i class="fas fa-lightbulb"></i> 请描述您的创作想法或想要了解的传统技艺细节
                </div>
                
                <textarea id="inputText" placeholder="例如：我想创作一个带有传统云纹的陶瓷花瓶，瓶身要体现宋代瓷器的素雅之美..."></textarea>
                
                <div class="action-buttons">
                    <button class="btn btn-primary" onclick="generateCraftIdea()">
                        <i class="fas fa-seedling"></i> 生成创作方案
                    </button>
                    <button class="btn btn-secondary" onclick="learnCraftHistory()">
                        <i class="fas fa-history"></i> 了解技艺历史
                    </button>
                    <button class="btn btn-secondary" onclick="clearInput()">
                        <i class="fas fa-eraser"></i> 清空输入
                    </button>
                </div>
            </div>
            
            <div class="output-section traditional-border">
                <div class="seal seal-2">芯</div>
                
                <div class="craft-output-header">
                    <h2 class="section-title"><i class="fas fa-scroll"></i> 匠芯指引</h2>
                    <button class="btn-secondary" style="padding: 8px 15px; font-size: 0.9rem;" onclick="copyOutput()">
                        <i class="fas fa-copy"></i> 复制
                    </button>
                </div>
                
                <div class="loading" id="loadingIndicator">
                    <div class="loading-icon">
                        <i class="fas fa-spinner"></i>
                    </div>
                    <p class="loading-text">匠芯正在为您构思创作方案...</p>
                </div>
                
                <div class="output-content" id="outputContent">
                    <h3>欢迎使用匠芯创作系统</h3>
                    <p>在这里，您可以：</p>
                    <ul>
                        <li>选择感兴趣的传统技艺</li>
                        <li>获取个性化的创作方案</li>
                        <li>了解传统技艺的历史与技艺要点</li>
                        <li>获取现代与传统结合的创新灵感</li>
                    </ul>
                    <p>请从左侧选择一种传统技艺，并描述您的创作想法。</p>
                </div>
            </div>
        </section>
        
        <!-- 底部 -->
        <footer class="footer">
            <div class="footer-logo">
                <i class="fas fa-hands"></i> 匠芯
            </div>
            <p>传统技艺创作辅助系统 © 2023</p>
            <p>传承非遗文化，创新传统技艺</p>
        </footer>
    </div>

    <script>
        // 传统技艺数据
        const crafts = [
            {
                id: 1,
                name: "陶瓷制作",
                icon: "fas fa-vase",
                tags: ["非遗", "手工艺", "烧制"],
                color: "#c17a62",

                details: {
                    history: "中国陶瓷历史悠久，早在一万年前的新石器时代就开始制作陶器。宋代瓷器达到艺术顶峰，五大名窑闻名世界。",
                    materials: ["陶土", "瓷土", "釉料", "彩料"],

                details: {

                }
            },
            {
                id: 4,
                name: "书法艺术",
                icon: "fas fa-brush",
                tags: ["艺术", "文化", "书写"],

                }
            },
            {
                id: 5,
                name: "剪纸艺术",
                icon: "fas fa-cut",
                tags: ["民间艺术", "非遗", "手工"],
                color: "#d46a6a",
                desc: "方寸之间，剪出万千世界。剪纸是中国最普及的民间传统装饰艺术之一。",
                imageUrl: "papercut.jpg",
                details: {
                    history: "剪纸艺术起源于南北朝时期，至今已有1500多年历史，广泛用于节日装饰和生活礼仪。",
                    materials: ["红纸", "彩纸", "金箔纸", "蜡盘"],
                    tools: ["剪刀", "刻刀", "垫板", "图案"],

                    modern: "现代剪纸艺术融入当代设计元素，应用于平面设计、动画、建筑装饰等领域。"
                }
            },
            {
                id: 6,
                name: "漆器工艺",
                icon: "fas fa-paint-roller",

// 新增：渲染技艺详情到右侧输出区
function renderCraftDetails(craft) {
    const outputContent = document.getElementById('outputContent');
    outputContent.innerHTML = `

        </div>
        <div class="craft-content">

            <ul>
                ${craft.details.materials.map(m => `<li>${m}</li>`).join('')}
            </ul>
            
            <h4>🔧 主要工具</h4>
            <ul>
                ${craft.details.tools.map(t => `<li>${t}</li>`).join('')}
            </ul>
            
            <h4>✂️ 核心技法</h4>
            <ul>
                ${craft.details.techniques.map(tech => `<li>${tech}</li>`).join('')}
            </ul>
            
            <h4>🌟 现代发展</h4>
            <p>${craft.details.modern}</p>
        </div>
    `;
}
    // 更新输入框提示

        // 显示加载指示器
        function showLoading() {
            document.getElementById('loadingIndicator').style.display = 'block';
            document.getElementById('outputContent').style.display = 'none';
        }
        
        // 隐藏加载指示器
        function hideLoading() {
            document.getElementById('loadingIndicator').style.display = 'none';
            document.getElementById('outputContent').style.display = 'block';
        }
        
        // 生成创作方案
        function generateCraftIdea() {
            const inputText = document.getElementById('inputText').value;
            
            if (!inputText.trim() && inputText.length < 5) {
                alert('请描述您的创作想法，至少5个字以上');
                return;
            }
            
            showLoading();
            
            // 模拟AI处理延迟
            setTimeout(() => {
                const idea = generateIdea(selectedCraft, inputText);
                displayOutput(idea, "创作方案");
                hideLoading();
            }, 1800);
        }
        
        // 了解技艺历史
        function learnCraftHistory() {
            showLoading();
            
            // 模拟AI处理延迟
            setTimeout(() => {
                const history = generateHistory(selectedCraft);
                displayOutput(history, "技艺传承");
                hideLoading();
            }, 1500);
        }

        function generateIdea(craft, userInput) {
            const techniques = craft.details.techniques;
            const materials = craft.details.materials;

            const randomTechnique = techniques[Math.floor(Math.random() * techniques.length)];
            const randomMaterial = materials[Math.floor(Math.random() * materials.length)];
            
            return `## ${craft.name}创作方案

### 您的创作想法：
"${userInput}"

### 匠芯建议：
1. **主题构思**：建议以"传统与现代的对话"为主题，将${craft.name}的传统技艺与现代设计理念结合。

2. **技法推荐**：重点使用${randomTechnique}技法，这是${craft.name}的核心技艺之一，能充分展现工艺之美。

3. **材料选择**：推荐使用${randomMaterial}作为主要材料，这种材料在历史上常用于制作精品，能体现传统韵味。

   - 第四步：精细加工与修饰

6. **文化内涵**：作品可以体现"天人合一"的传统哲学思想，通过${craft.name}表达对自然与文化的尊重。

创作过程中，不妨放慢节奏，感受每一道工序带来的愉悦。传统技艺的精髓不仅在于结果，更在于制作过程中的专注与投入。`;
        }
        
        // 生成技艺历史
        function generateHistory(craft) {
            return `## ${craft.name}技艺传承

${craft.details.history}

${craft.details.materials.map(material => `- ${material}`).join('\n')}

${craft.details.tools.map(tool => `- ${tool}`).join('\n')}

${craft.details.techniques.map(technique => `- ${technique}`).join('\n')}

### 现代发展：
${craft.details.modern}

${craft.name}不仅是一种手工艺，更是中华文化的重要载体。它体现了：

        }

        function displayOutput(content, title) {

            }
        }

renderCraftDetails(crafts[0]);
